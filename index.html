<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Calculadora Científica Android PRO 6</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/display.css">
  <link rel="stylesheet" href="css/keypad.css">
</head>
<body>
<main class="calculator" aria-label="Calculadora Científica">
  <header class="topbar">
    <strong>Calculadora Científica</strong>
    <button class="toggle locked" type="button" aria-disabled="true">WOSvip®</button>
  </header>

  <section class="display" aria-live="polite">
    <div id="history" class="history"></div>
    <div id="expr" class="expr">0</div>
  </section>

  <section id="scientific" class="scientific open always-open" aria-label="Teclado científico">
    <button data-insert="sin(">sin</button><button data-insert="cos(">cos</button><button data-insert="tan(">tan</button><button data-insert="log(">log</button><button data-insert="ln(">ln</button>
    <button data-insert="asin(">asin</button><button data-insert="acos(">acos</button><button data-insert="atan(">atan</button><button data-insert="√(">√</button><button data-insert="³√(">³√</button>
    <button data-insert="π">π</button><button data-insert="e">e</button><button data-action="square">x²</button><button data-insert="^">xʸ</button><button data-action="reciprocal">1/x</button>
    <button data-insert="(">(</button><button data-insert=")">)</button><button data-insert="!">x!</button><button data-insert="mod">mod</button><button id="angleBtn" data-action="angle">DEG</button>
    <button data-insert="sinh(">sinh</button><button data-insert="cosh(">cosh</button><button data-insert="tanh(">tanh</button><button data-insert="log2(">log₂</button><button data-action="abs">|x|</button>
    <button data-action="mc">MC</button><button data-action="mr">MR</button><button data-action="mplus">M+</button><button data-action="mminus">M−</button><button data-action="rand">Rand</button>
  </section>

  <section class="mainpad" aria-label="Teclado principal">
    <button class="danger" data-action="clear">C</button><button data-action="back">⌫</button><button data-action="sign">±</button><button class="op" data-insert="÷">÷</button>
    <button data-insert="7">7</button><button data-insert="8">8</button><button data-insert="9">9</button><button class="op" data-insert="×">×</button>
    <button data-insert="4">4</button><button data-insert="5">5</button><button data-insert="6">6</button><button class="op" data-insert="-">−</button>
    <button data-insert="1">1</button><button data-insert="2">2</button><button data-insert="3">3</button><button class="op" data-insert="+">+</button>
    <button class="zero" data-insert="0">0</button><button data-insert=".">.</button><button class="op equals" data-action="equals">=</button>
  </section>

  <footer>Aprenda para evoluir — Wellington Oliveira</footer>
</main>
<script src="js/parser.js"></script>
<script src="js/app.js"></script>
</body>
</html>
