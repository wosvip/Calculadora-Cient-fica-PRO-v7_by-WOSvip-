<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculadora">
    <link rel="apple-touch-icon" href="icone.png">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-image: url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            height: 100vh;
            height: 100dvh; 
            margin: 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            touch-action: manipulation; 
            user-select: none;
            -webkit-user-select: none;
        }

        .calculadora {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            
            padding: 24px;
            border-radius: 32px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }

        /* Estilização da assinatura do desenvolvedor */
        .creditos {
            color: #a5a5a5;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            font-weight: 400;
            opacity: 0.8;
        }

        .container-visor {
            background-color: transparent; 
            padding: 10px;
            margin-bottom: 24px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 110px;
        }

        #expressao {
            color: #b3b3b3;
            font-size: 1.2rem;
            min-height: 28px;
            word-wrap: break-word;
            overflow: hidden;
        }

        #visor-principal {
            color: #ffffff;
            font-size: 3rem;
            font-weight: 300;
            margin-top: 5px;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            aspect-ratio: 1; 
            border-radius: 50%;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            opacity: 0.6;
        }

        .numero { background-color: rgba(255, 255, 255, 0.15); color: #ffffff; }
        .operador { background-color: #ff9f0a; color: #ffffff; }
        .comando { background-color: rgba(255, 255, 255, 0.4); color: #000000; }

        .duplo {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 100%;
            border-radius: 40px;
            justify-content: flex-start;
            padding-left: 30px;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <!-- Texto de créditos adicionado no topo -->
        <div class="creditos">Desenvolvido por Wellington Oliveira</div>

        <div class="container-visor">
            <div id="expressao"></div>
            <div id="visor-principal">0</div>
        </div>
        
        <div class="botoes">
            <button class="comando" onclick="limparVisor()">AC</button>
            <button class="comando" onclick="inverterSinal()">+/-</button>
            <button class="comando" onclick="aplicarPorcentagem()">%</button>
            <button class="operador" onclick="inserirOperador('/')">÷</button>

            <button class="numero" onclick="inserirNumero('7')">7</button>
            <button class="numero" onclick="inserirNumero('8')">8</button>
            <button class="numero" onclick="inserirNumero('9')">9</button>
            <button class="operador" onclick="inserirOperador('*')">×</button>

            <button class="numero" onclick="inserirNumero('4')">4</button>
            <button class="numero" onclick="inserirNumero('5')">5</button>
            <button class="numero" onclick="inserirNumero('6')">6</button>
            <button class="operador" onclick="inserirOperador('-')">-</button>

            <button class="numero" onclick="inserirNumero('1')">1</button>
            <button class="numero" onclick="inserirNumero('2')">2</button>
            <button class="numero" onclick="inserirNumero('3')">3</button>
            <button class="operador" onclick="inserirOperador('+')">+</button>

            <button class="numero duplo" onclick="inserirNumero('0')">0</button>
            <button class="numero" onclick="inserirPonto()">.</button>
            <button class="operador" onclick="calcularResultado()">=</button>
        </div>
    </div>

    <script>
        const visorPrincipal = document.getElementById('visor-principal');
        const visorExpressao = document.getElementById('expressao');
        let operacaoAtual = ''; 
        let resetarVisor = false;

        function atualizarExpressaoVisivel() {
            let textoFormatado = operacaoAtual
                .replace(/\*/g, ' × ')
                .replace(/\//g, ' ÷ ')
                .replace(/\+/g, ' + ')
                .replace(/\-/g, ' - ');
            visorExpressao.innerText = textoFormatado;
        }

        function inserirNumero(numero) {
            if (visorPrincipal.innerText === '0' || resetarVisor) {
                visorPrincipal.innerText = numero;
                resetarVisor = false;
            } else {
                visorPrincipal.innerText += numero;
            }
            operacaoAtual += numero;
            atualizarExpressaoVisivel();
        }

        function inserirOperador(operador) {
            if (operacaoAtual === '' && visorPrincipal.innerText !== '0') {
                operacaoAtual = visorPrincipal.innerText;
            }
            const ultimoChar = operacaoAtual.slice(-1);
            if (['+', '-', '*', '/'].includes(ultimoChar)) {
                operacaoAtual = operacaoAtual.slice(0, -1);
            }
            operacaoAtual += operador;
            atualizarExpressaoVisivel();
            resetarVisor = true;
        }

        function inserirPonto() {
            if (resetarVisor) {
                visorPrincipal.innerText = '0.';
                operacaoAtual += '0.';
                resetarVisor = false;
                atualizarExpressaoVisivel();
                return;
            }
            if (!visorPrincipal.innerText.includes('.')) {
                visorPrincipal.innerText += '.';
                operacaoAtual += '.';
                atualizarExpressaoVisivel();
            }
        }

        function limparVisor() {
            visorPrincipal.innerText = '0';
            visorExpressao.innerText = '';
            operacaoAtual = '';
            resetarVisor = false;
        }

        function inverterSinal() {
            if (visorPrincipal.innerText !== '0') {
                let valor = String(Number(visorPrincipal.innerText) * -1);
                visorPrincipal.innerText = valor;
                operacaoAtual = valor;
                atualizarExpressaoVisivel();
            }
        }

        function aplicarPorcentagem() {
            if (visorPrincipal.innerText !== '0') {
                let valor = String(Number(visorPrincipal.innerText) / 100);
                visorPrincipal.innerText = valor;
                operacaoAtual = valor;
                atualizarExpressaoVisivel();
            }
        }

        function calcularResultado() {
            if (operacaoAtual === '') return;
            try {
                let resultado = eval(operacaoAtual);
                resultado = parseFloat(resultado.toFixed(8));
                visorPrincipal.innerText = resultado;
                operacaoAtual = String(resultado);
                resetarVisor = true;
            } catch (error) {
                visorPrincipal.innerText = 'Erro';
                operacaoAtual = '';
            }
        }
    </script>
</body>
</html>
